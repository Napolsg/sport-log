<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1e1e2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sport Log">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Sport Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#1e1e2e;--sf:#2a2a3e;--sf2:#32324a;--sf3:#3c3c56;--bd:#44445a;--ac:#a8d8a8;--ac2:#7ec8a0;--red:#e07a7a;--tx:#e8e8f0;--mu:#8888a8;--mono:'IBM Plex Mono',monospace;--r:8px;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--mono);}
    .app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;}
    .hdr{padding:calc(var(--safe-top) + 12px) 16px 10px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg);}
    .hdr-l{display:flex;align-items:baseline;gap:8px;}
    .hdr h1{font-size:13px;font-weight:600;letter-spacing:.1em;color:var(--ac);text-transform:uppercase;margin:0;}
    .ver{font-size:9px;color:var(--mu);}
    .today-l{font-size:11px;color:var(--mu);}
    .tabs{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0;background:var(--bg);}
    .tab{flex:1;padding:10px 0;text-align:center;font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:var(--mono);}
    .tab.active{color:var(--ac);border-bottom-color:var(--ac);}
    .content{flex:1;overflow-y:auto;padding:14px 14px calc(var(--safe-bottom) + 14px);-webkit-overflow-scrolling:touch;}
    .day-label{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:11px;color:var(--mu);}
    .day-label input[type=date]{background:var(--sf);border:1px solid var(--bd);color:var(--tx);font-family:var(--mono);font-size:11px;padding:5px 9px;border-radius:4px;outline:none;color-scheme:dark;}
    .timer-bar{display:flex;align-items:center;gap:10px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:10px 14px;margin-bottom:12px;}
    .td{font-size:22px;font-weight:600;color:var(--ac);min-width:58px;letter-spacing:.05em;}
    .td.run{color:var(--ac2);}.td.alr{color:var(--red);}
    .t-right{display:flex;flex-direction:column;gap:5px;flex:1;}
    .t-btns{display:flex;gap:5px;}
    .bt{background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font-family:var(--mono);font-size:10px;padding:5px 8px;border-radius:4px;cursor:pointer;flex:1;}
    .bt.on{border-color:var(--ac);color:var(--ac);}
    .bt:active{background:var(--sf3);}
    .presets{display:flex;gap:4px;}
    .pr{background:var(--sf2);border:1px solid var(--bd);color:var(--mu);font-family:var(--mono);font-size:10px;padding:4px 7px;border-radius:4px;cursor:pointer;}
    .pr:active{border-color:var(--ac);color:var(--ac);}
    .add-exo{display:flex;gap:8px;margin-bottom:10px;position:relative;}
    .exo-wrap{flex:1;position:relative;min-width:0;}
    .add-exo input{background:var(--sf);border:1px solid var(--bd);color:var(--tx);font-family:var(--mono);font-size:13px;padding:10px 12px;border-radius:var(--r);width:100%;outline:none;}
    .add-exo input:focus{border-color:var(--ac2);}
    .add-exo input::placeholder{color:var(--mu);}
    .dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--sf2);border:1px solid var(--bd);border-radius:var(--r);z-index:50;max-height:180px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.4);}
    .ddi{padding:9px 12px;font-size:12px;cursor:pointer;color:var(--tx);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
    .ddi:last-child{border-bottom:none;}
    .ddi:active{background:var(--sf3);}
    .ddi.new{color:var(--ac);font-style:italic;}
    .ddx{color:var(--mu);font-size:11px;padding:2px 6px;}
    .btn-acc{background:var(--ac);color:#1e1e2e;border:none;font-family:var(--mono);font-size:18px;font-weight:700;padding:10px 16px;border-radius:var(--r);cursor:pointer;flex-shrink:0;line-height:1;}
    .btn-acc:active{opacity:.8;}
    .save-st{font-size:11px;color:var(--ac2);text-align:right;min-height:16px;margin-bottom:4px;}
    .exo-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;}
    .exo-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
    .exo-name{font-size:13px;font-weight:600;color:var(--tx);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .bdel{background:transparent;border:none;cursor:pointer;color:var(--mu);font-size:15px;padding:4px 6px;line-height:1;}
    .bdel:active{color:var(--red);}
    .series-list{display:flex;flex-direction:column;gap:7px;}
    .serie-row{display:flex;align-items:center;gap:6px;}
    .snum{font-size:11px;color:var(--mu);min-width:16px;text-align:right;}
    .si{background:var(--sf2);border:1px solid var(--bd);color:var(--tx);font-family:var(--mono);font-size:14px;padding:7px 5px;border-radius:5px;width:56px;text-align:center;outline:none;-moz-appearance:textfield;}
    .si::-webkit-inner-spin-button,.si::-webkit-outer-spin-button{-webkit-appearance:none;}
    .si:focus{border-color:var(--ac2);}
    .sep{color:var(--mu);font-size:12px;}
    .kgl{color:var(--mu);font-size:11px;}
    .bds{background:transparent;border:none;cursor:pointer;color:var(--mu);font-size:13px;padding:4px;margin-left:auto;line-height:1;}
    .bds:active{color:var(--red);}
    .bas{background:transparent;border:1px dashed var(--bd);color:var(--mu);font-family:var(--mono);font-size:11px;padding:7px 0;border-radius:5px;cursor:pointer;width:100%;margin-top:8px;}
    .bas:active{border-color:var(--ac2);color:var(--ac);}
    .past-section{margin-top:20px;}
    .past-title{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--mu);text-transform:uppercase;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--bd);}
    .past-day{margin-bottom:12px;}
    .past-day-lbl{font-size:11px;font-weight:600;color:var(--red);letter-spacing:.05em;margin-bottom:5px;}
    .past-exo{margin-bottom:6px;}
    .past-exo-name{font-size:11px;color:var(--tx);margin-bottom:3px;}
    .past-chips{display:flex;gap:4px;flex-wrap:wrap;}
    .pchip{background:var(--sf2);border:1px solid var(--bd);border-radius:3px;font-size:10px;padding:2px 6px;color:var(--mu);}
    .pchip b{color:var(--red);}
    .hist-day{margin-bottom:20px;}
    .hist-day-title{font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--ac);text-transform:uppercase;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--bd);}
    .hist-exo{margin-bottom:8px;}
    .hist-exo-name{font-size:12px;color:var(--tx);margin-bottom:4px;}
    .hist-series{display:flex;gap:5px;flex-wrap:wrap;}
    .hchip{background:var(--sf);border:1px solid var(--bd);border-radius:4px;font-size:11px;padding:3px 7px;color:var(--mu);}
    .hchip b{color:var(--ac);}
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
    .stat-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 12px;}
    .stat-lbl{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
    .stat-val{font-size:26px;font-weight:600;color:var(--ac);}
    .sec-title{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;margin-top:18px;}
    .freq-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd);font-size:12px;}
    .freq-row:last-child{border-bottom:none;}
    .freq-cnt{color:var(--ac);font-weight:600;}
    .exo-sel{margin-bottom:12px;}
    .exo-sel select{background:var(--sf);border:1px solid var(--bd);color:var(--tx);font-family:var(--mono);font-size:12px;padding:8px 10px;border-radius:var(--r);width:100%;outline:none;color-scheme:dark;}
    .chart-wrap{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:14px;}
    .chart-title{font-size:11px;color:var(--tx);margin-bottom:12px;font-weight:500;}
    .chart-legend{display:flex;gap:12px;margin-top:10px;}
    .legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--mu);}
    .legend-dot{width:10px;height:10px;border-radius:2px;}
    .empty{text-align:center;color:var(--mu);font-size:12px;padding:48px 20px;line-height:1.8;}
  </style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-l"><h1>Sport Log</h1><span class="ver">v2.0</span></div>
    <span class="today-l" id="tl"></span>
  </div>
  <div class="tabs">
    <div class="tab active" id="tab-log" onclick="showTab('log')">Log</div>
    <div class="tab" id="tab-history" onclick="showTab('history')">Historique</div>
    <div class="tab" id="tab-stats" onclick="showTab('stats')">Stats</div>
  </div>
  <div class="content" id="content"></div>
</div>
<script>
const DAYS=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const MONTHS=['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
let sessions={},savedExos=[],currentDate=todayKey(),activeTab='log',saveTimer=null;
let tInterval=null,tSecs=0,tRunning=false,tTarget=0,activeStatsExo=null;
function todayKey(){return new Date().toISOString().slice(0,10);}
function fmtKey(k){const d=new Date(k+'T12:00:00');return DAYS[d.getDay()]+' '+d.getDate()+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();}
function fmtS(k){const d=new Date(k+'T12:00:00');return DAYS[d.getDay()]+' '+d.getDate()+' '+MONTHS[d.getMonth()];}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getSess(d){if(!sessions[d])sessions[d]={exercises:[]};return sessions[d];}
function load(){try{const r=localStorage.getItem('sl_v2');if(r)sessions=JSON.parse(r);}catch(e){}try{const r=localStorage.getItem('sl_exos');if(r)savedExos=JSON.parse(r);}catch(e){}}
function doSave(){try{localStorage.setItem('sl_v2',JSON.stringify(sessions));}catch(e){}try{localStorage.setItem('sl_exos',JSON.stringify(savedExos));}catch(e){}const el=document.getElementById('save-st');if(el){el.textContent='sauvegardé ✓';setTimeout(()=>{if(el)el.textContent='';},1400);}}
function scheduleSave(){if(saveTimer)clearTimeout(saveTimer);saveTimer=setTimeout(doSave,700);}
function addSavedExo(n){if(!savedExos.includes(n)){savedExos.push(n);try{localStorage.setItem('sl_exos',JSON.stringify(savedExos));}catch(e){}}}
function delSavedExo(n){savedExos=savedExos.filter(e=>e!==n);try{localStorage.setItem('sl_exos',JSON.stringify(savedExos));}catch(e){}updDD();}
function showTab(t){activeTab=t;['log','history','stats'].forEach(id=>document.getElementById('tab-'+id).classList.toggle('active',id===t));render();}
function render(){if(activeTab==='log')renderLog();else if(activeTab==='history')renderHistory();else renderStats();}
function tFmt(s){const m=Math.floor(s/60),sc=s%60;return String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0');}
function startTimer(){if(tRunning)return;tRunning=true;tInterval=setInterval(tTick,1000);updT();}
function stopTimer(){tRunning=false;clearInterval(tInterval);updT();}
function resetTimer(){stopTimer();tSecs=0;tTarget=0;updT();}
function setPreset(s){stopTimer();tSecs=0;tTarget=s;updT();startTimer();}
function tTick(){tSecs++;updT();if(tTarget>0&&tSecs>=tTarget){beep();stopTimer();}}
function updT(){const el=document.getElementById('td');if(!el)return;const disp=tTarget>0?Math.max(0,tTarget-tSecs):tSecs;el.textContent=tFmt(disp);el.className='td'+(tRunning?' run':'')+(tTarget>0&&(tTarget-tSecs)<=5&&tRunning?' alr':'');const bs=document.getElementById('bt-s'),bp=document.getElementById('bt-p');if(bs)bs.className='bt'+(tRunning?'':' on');if(bp)bp.className='bt'+(tRunning?' on':'');}
function beep(){try{const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;o.type='sine';g.gain.setValueAtTime(0.3,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.6);o.start();o.stop(c.currentTime+0.6);}catch(e){}}
function renderLog(){
  const sess=getSess(currentDate),c=document.getElementById('content');c.innerHTML='';
  const db=document.createElement('div');db.className='day-label';db.innerHTML='<span>Séance du</span><input type="date" id="dp" value="'+currentDate+'" max="'+todayKey()+'">';c.appendChild(db);
  document.getElementById('dp').addEventListener('change',e=>{currentDate=e.target.value;renderLog();});
  const tb=document.createElement('div');tb.className='timer-bar';tb.innerHTML='<span class="td" id="td">00:00</span><div class="t-right"><div class="t-btns"><button class="bt on" id="bt-s" onclick="startTimer()">▶ Start</button><button class="bt" id="bt-p" onclick="stopTimer()">⏸ Stop</button><button class="bt" onclick="resetTimer()">↺ Reset</button></div><div class="presets"><button class="pr" onclick="setPreset(60)">1min</button><button class="pr" onclick="setPreset(90)">1m30</button><button class="pr" onclick="setPreset(120)">2min</button><button class="pr" onclick="setPreset(180)">3min</button></div></div>';c.appendChild(tb);updT();
  const ss=document.createElement('div');ss.className='save-st';ss.id='save-st';c.appendChild(ss);
  const ar=document.createElement('div');ar.className='add-exo';ar.innerHTML='<div class="exo-wrap"><input type="text" id="nei" placeholder="Ajouter un exercice…" autocomplete="off" autocorrect="off"><div class="dropdown" id="dd" style="display:none;"></div></div><button class="btn-acc" onclick="addExo()">+</button>';c.appendChild(ar);
  const inp=document.getElementById('nei');inp.addEventListener('input',updDD);inp.addEventListener('focus',updDD);inp.addEventListener('keydown',e=>{if(e.key==='Enter')addExo();if(e.key==='Escape')hideDD();});
  document.addEventListener('click',e=>{if(!ar.contains(e.target))hideDD();});
  if(sess.exercises.length===0){const em=document.createElement('div');em.className='empty';em.innerHTML='Aucun exercice pour cette séance.<br>Ajoute-en un ci-dessus.';c.appendChild(em);}
  else{sess.exercises.forEach((exo,ei)=>{const card=document.createElement('div');card.className='exo-card';card.innerHTML='<div class="exo-hdr"><span class="exo-name">'+esc(exo.name)+'</span><button class="bdel" onclick="delExo('+ei+')">✕</button></div><div class="series-list" id="sl-'+ei+'"></div><button class="bas" onclick="addSerie('+ei+')">+ ajouter une série</button>';c.appendChild(card);renderSeries(ei);});}
  const pastKeys=Object.keys(sessions).filter(k=>k<currentDate&&sessions[k].exercises&&sessions[k].exercises.length>0).sort((a,b)=>b.localeCompare(a));
  if(pastKeys.length>0){const ps=document.createElement('div');ps.className='past-section';ps.innerHTML='<div class="past-title">Historique des séances</div>';pastKeys.forEach(k=>{const s2=sessions[k],dd=document.createElement('div');dd.className='past-day';let h='<div class="past-day-lbl">'+fmtS(k)+'</div>';s2.exercises.forEach(exo=>{h+='<div class="past-exo"><div class="past-exo-name">'+esc(exo.name)+'</div><div class="past-chips">';exo.series.forEach((s,i)=>{const r=s.reps||'—',kg=s.kg?' × '+s.kg+'kg':'';h+='<div class="pchip">S'+(i+1)+' <b>'+r+'</b>'+kg+'</div>';});h+='</div></div>';});dd.innerHTML=h;ps.appendChild(dd);});c.appendChild(ps);}
}
function updDD(){const inp=document.getElementById('nei'),dd=document.getElementById('dd');if(!inp||!dd)return;const val=inp.value.trim().toLowerCase();const matches=savedExos.filter(e=>!val||e.toLowerCase().includes(val));if(matches.length===0&&!val){dd.style.display='none';return;}dd.style.display='block';dd.innerHTML='';matches.forEach(name=>{const item=document.createElement('div');item.className='ddi';item.innerHTML='<span>'+esc(name)+'</span><span class="ddx">✕</span>';item.querySelector('.ddx').addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();delSavedExo(name);});item.addEventListener('mousedown',e=>{if(e.target.classList.contains('ddx'))return;e.preventDefault();inp.value=name;hideDD();addExo();});dd.appendChild(item);});if(val&&!savedExos.map(e=>e.toLowerCase()).includes(val)){const item=document.createElement('div');item.className='ddi new';item.textContent='+ Ajouter "'+inp.value.trim()+'"';item.addEventListener('mousedown',e=>{e.preventDefault();addExo();});dd.appendChild(item);}}
function hideDD(){const dd=document.getElementById('dd');if(dd)dd.style.display='none';}
function addExo(){const inp=document.getElementById('nei');const name=inp.value.trim();if(!name)return;addSavedExo(name);getSess(currentDate).exercises.push({name,series:[{reps:'',kg:''}]});inp.value='';hideDD();scheduleSave();renderLog();setTimeout(()=>{const cards=document.querySelectorAll('.exo-card');if(cards.length)cards[cards.length-1].scrollIntoView({behavior:'smooth',block:'start'});},60);}
function delExo(ei){if(!confirm('Supprimer ?'))return;getSess(currentDate).exercises.splice(ei,1);scheduleSave();renderLog();}
function renderSeries(ei){const exo=getSess(currentDate).exercises[ei];const cont=document.getElementById('sl-'+ei);if(!cont)return;cont.innerHTML='';exo.series.forEach((s,si)=>{const row=document.createElement('div');row.className='serie-row';row.innerHTML='<span class="snum">'+(si+1)+'</span><input class="si" type="number" inputmode="numeric" min="0" placeholder="reps" value="'+(s.reps||'')+'"><span class="sep">×</span><input class="si" type="number" inputmode="decimal" min="0" step="0.5" placeholder="kg" value="'+(s.kg||'')+'"><span class="kgl">kg</span><button class="bds" onclick="delSerie('+ei+','+si+')">✕</button>';const ins=row.querySelectorAll('input');ins[0].addEventListener('input',()=>{exo.series[si].reps=ins[0].value;scheduleSave();});ins[1].addEventListener('input',()=>{exo.series[si].kg=ins[1].value;scheduleSave();});cont.appendChild(row);});}
function addSerie(ei){getSess(currentDate).exercises[ei].series.push({reps:'',kg:''});scheduleSave();renderSeries(ei);}
function delSerie(ei,si){const exo=getSess(currentDate).exercises[ei];if(exo.series.length===1)return;exo.series.splice(si,1);scheduleSave();renderSeries(ei);}
function renderHistory(){const c=document.getElementById('content');c.innerHTML='';const keys=Object.keys(sessions).filter(k=>sessions[k].exercises&&sessions[k].exercises.length>0).sort((a,b)=>b.localeCompare(a));if(keys.length===0){c.innerHTML='<div class="empty">Aucune séance enregistrée.</div>';return;}keys.forEach(k=>{const sess=sessions[k],block=document.createElement('div');block.className='hist-day';let h='<div class="hist-day-title">'+fmtKey(k)+'</div>';sess.exercises.forEach(exo=>{h+='<div class="hist-exo"><div class="hist-exo-name">'+esc(exo.name)+'</div><div class="hist-series">';exo.series.forEach((s,i)=>{const r=s.reps||'—',kg=s.kg?' × '+s.kg+'kg':'';h+='<div class="hchip">S'+(i+1)+' <b>'+r+'</b>'+kg+'</div>';});h+='</div></div>';});block.innerHTML=h;c.appendChild(block);});}
function renderStats(){const c=document.getElementById('content');c.innerHTML='';const keys=Object.keys(sessions).filter(k=>sessions[k].exercises&&sessions[k].exercises.length>0);let totalSeries=0,totalReps=0;const exoCount={};keys.forEach(k=>{sessions[k].exercises.forEach(exo=>{exoCount[exo.name]=(exoCount[exo.name]||0)+1;exo.series.forEach(s=>{totalSeries++;if(s.reps)totalReps+=parseInt(s.reps)||0;});});});const topExo=Object.entries(exoCount).sort((a,b)=>b[1]-a[1]);const g=document.createElement('div');g.className='stat-grid';g.innerHTML='<div class="stat-card"><div class="stat-lbl">Séances</div><div class="stat-val">'+keys.length+'</div></div><div class="stat-card"><div class="stat-lbl">Séries</div><div class="stat-val">'+totalSeries+'</div></div><div class="stat-card"><div class="stat-lbl">Répétitions</div><div class="stat-val">'+totalReps+'</div></div><div class="stat-card"><div class="stat-lbl">Exercices</div><div class="stat-val">'+Object.keys(exoCount).length+'</div></div>';c.appendChild(g);if(topExo.length===0){const em=document.createElement('div');em.className='empty';em.textContent='Pas encore de données.';c.appendChild(em);return;}const sw=document.createElement('div');sw.className='exo-sel';sw.innerHTML='<select id="ss"><option value="">— Choisir un exercice —</option>'+topExo.map(([n])=>'<option value="'+esc(n)+'"'+(n===activeStatsExo?' selected':'')+'>'+esc(n)+'</option>').join('')+'</select>';c.appendChild(sw);const ca=document.createElement('div');ca.id='ca';c.appendChild(ca);document.getElementById('ss').addEventListener('change',e=>{activeStatsExo=e.target.value;renderChart(activeStatsExo);});if(activeStatsExo)renderChart(activeStatsExo);const ft=document.createElement('div');ft.className='sec-title';ft.textContent='Exercices fréquents';c.appendChild(ft);topExo.slice(0,10).forEach(([n,v])=>{const r=document.createElement('div');r.className='freq-row';r.innerHTML='<span>'+esc(n)+'</span><span class="freq-cnt">'+v+'×</span>';c.appendChild(r);});}
function renderChart(name){const area=document.getElementById('ca');if(!area||!name)return;area.innerHTML='';const keys=Object.keys(sessions).filter(k=>sessions[k].exercises&&sessions[k].exercises.some(e=>e.name===name)).sort((a,b)=>a.localeCompare(b));const pts=keys.map(k=>{const exo=sessions[k].exercises.find(e=>e.name===name);const tot=exo.series.reduce((s,r)=>s+(parseInt(r.reps)||0),0);const mx=Math.max(...exo.series.map(r=>parseInt(r.reps)||0));return{date:fmtS(k),tot,mx};});if(pts.length===0)return;const W=320,H=120,PL=28,PR=10,PT=10,PB=30,chartW=W-PL-PR,chartH=H-PT-PB;const maxVal=Math.max(...pts.map(d=>d.tot),1);const barW=Math.min(28,chartW/pts.length*0.6);const step=chartW/pts.length;let bars='',line='',dots='',labels='';pts.forEach((d,i)=>{const x=PL+i*step+step/2;const bH=(d.tot/maxVal)*chartH;bars+='<rect x="'+(x-barW/2).toFixed(1)+'" y="'+(PT+chartH-bH).toFixed(1)+'" width="'+barW+'" height="'+bH.toFixed(1)+'" rx="3" fill="rgba(168,216,168,0.45)" stroke="#a8d8a8" stroke-width="1"/>';const dy=(PT+chartH-(d.mx/maxVal)*chartH).toFixed(1);if(i===0)line+='M'+x.toFixed(1)+','+dy;else line+=' L'+x.toFixed(1)+','+dy;dots+='<circle cx="'+x.toFixed(1)+'" cy="'+dy+'" r="3.5" fill="#e07a7a"/>';labels+='<text x="'+x.toFixed(1)+'" y="'+(H-6)+'" text-anchor="middle" fill="#8888a8" font-size="8" font-family="IBM Plex Mono,monospace">'+esc(d.date.slice(0,7))+'</text>';});let yAxis='';for(let i=0;i<=4;i++){const y=(PT+chartH*(1-i/4)).toFixed(1);const val=Math.round(maxVal*i/4);yAxis+='<line x1="'+PL+'" y1="'+y+'" x2="'+(W-PR)+'" y2="'+y+'" stroke="rgba(255,255,255,0.06)" stroke-width="1"/><text x="'+(PL-3)+'" y="'+(parseFloat(y)+3).toFixed(1)+'" text-anchor="end" fill="#8888a8" font-size="8" font-family="IBM Plex Mono,monospace">'+val+'</text>';}const wrap=document.createElement('div');wrap.className='chart-wrap';wrap.innerHTML='<div class="chart-title">'+esc(name)+' — reps par séance</div><svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:'+H+'px;display:block;">'+yAxis+bars+'<path d="'+line+'" fill="none" stroke="#e07a7a" stroke-width="2"/>'+dots+labels+'</svg><div class="chart-legend"><div class="legend-item"><div class="legend-dot" style="background:rgba(168,216,168,0.6);"></div>total reps</div><div class="legend-item"><div class="legend-dot" style="background:#e07a7a;border-radius:50%;"></div>max série</div></div>';area.appendChild(wrap);}
document.getElementById('tl').textContent=fmtS(todayKey());
load();render();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
